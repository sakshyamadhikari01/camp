<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Amarna:ital,wght@0,100..700;1,100..700&display=swap');
        body{
            background-color:bisque;
            font-size: 50px;
        }
        *{
            box-sizing: border-box;
        }
        

    



    
   

  
    .button {
        background-color: chocolate;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        display: block;
        margin: 20px auto;

    }
    .button:hover {
        background-color: darkorange;
        transform: scale(1.1);
    
    }

    .button:active {
        background-color: darkorange;
        transform: scale(0.9);
    }

    .p {
        font-size: 40px;
        text-align: center;
        color: chocolate;
        font-family: 'Amarna', sans-serif;
    }

    .h3 {
        font-size: 50px;
        text-align: center;
        color: chocolate;
        font-family: 'Amarna', sans-serif;
    }
    .pic {
        display: block;
    margin: 0 auto 20px; 
    width: 150px;        
    border-radius: 50%;  
    border: 5px solid chocolate;
    filter: grayscale(100%);
    transition: 0.5s ease;

    }
    .pic:hover {
        filter: grayscale(0%);
    }

    .dark-mode {
    background-color: chocolate !important;
}

.dark-mode .h3, 
.dark-mode .p {
    color: bisque !important;
    background-color: transparent !important; 
}



   </style>
   </head>
   <body>
    <h3 class="h3"> heyy this is my website </h3>
   <p class="p">my name is Tr3x, I live in nepal</P>
   <img src="https://i.pinimg.com/736x/a6/9b/94/a69b9491e5505888ca590c494d9694a0.jpg" class="pic" alt="Mausi">
   <button class="button" id="rick-roll-btn">Click here</button>
   
   <button class="button" id="theme-btn">Toggle Dark Mode</button>
   <script src="script.js"></script>
</body>
</html>
